services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kiro_gateway
      POSTGRES_USER: kiro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kiro_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiro -d kiro_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: kiro-gateway-backend:latest
    restart: on-failure:5
    env_file:
      - .env
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8000"
      DATABASE_URL: postgres://kiro:${POSTGRES_PASSWORD:-kiro_secret}@db:5432/kiro_gateway
    labels:
      com.datadoghq.ad.logs: '[{"source": "rust", "service": "rkgw-backend"}]'
      com.datadoghq.tags.env: "${DD_ENV:-production}"
      com.datadoghq.tags.service: "rkgw-backend"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: kiro-gateway-frontend:latest
    restart: unless-stopped
    environment:
      VITE_DD_CLIENT_TOKEN: ${VITE_DD_CLIENT_TOKEN:-}
      VITE_DD_APPLICATION_ID: ${VITE_DD_APPLICATION_ID:-}
      VITE_DD_ENV: ${VITE_DD_ENV:-production}
      VITE_DD_SERVICE: ${VITE_DD_SERVICE:-rkgw-frontend}
      VITE_DD_SITE: ${VITE_DD_SITE:-datadoghq.com}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: kiro-gateway-nginx:latest
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    environment:
      CERTBOT_EMAIL: ${EMAIL}
      DOMAIN: ${DOMAIN:-localhost}
      USE_LOCAL_CA: ${USE_LOCAL_CA:-1}
      STAGING: ${STAGING:-0}
    volumes:
      - letsencrypt:/etc/letsencrypt
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  datadog-agent:
    image: datadog/agent:latest
    profiles:
      - datadog
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_ENV: ${DD_ENV:-production}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_GRPC_ENDPOINT: "0.0.0.0:4317"
      DD_OTLP_CONFIG_RECEIVER_PROTOCOLS_HTTP_ENDPOINT: "0.0.0.0:4318"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "false"
      DD_CONTAINER_INCLUDE_LABELS: "com.datadoghq.tags.service"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pgdata:
  letsencrypt:
