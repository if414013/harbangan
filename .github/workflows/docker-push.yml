name: Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/if414013/harbangan-backend
  FRONTEND_IMAGE: ghcr.io/if414013/harbangan-frontend

jobs:
  # ── Build per-platform images in parallel ──────────────────────────
  # Native runners avoid QEMU emulation, which is extremely slow for
  # compiling Rust (~30-60 min via QEMU vs ~5 min native).
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          SHA="sha-${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=backend-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.suffix }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=frontend-${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.suffix }}

  # ── Merge per-platform images into multi-arch manifests ────────────
  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Extract version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          SHA="sha-${GITHUB_SHA::7}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge backend manifests
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          SHA="${{ steps.meta.outputs.sha }}"
          for FINAL_TAG in latest "$TAG" "$SHA"; do
            docker buildx imagetools create -t "$BACKEND_IMAGE:$FINAL_TAG" \
              "$BACKEND_IMAGE:$TAG-amd64" \
              "$BACKEND_IMAGE:$TAG-arm64"
          done

      - name: Merge frontend manifests
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          SHA="${{ steps.meta.outputs.sha }}"
          for FINAL_TAG in latest "$TAG" "$SHA"; do
            docker buildx imagetools create -t "$FRONTEND_IMAGE:$FINAL_TAG" \
              "$FRONTEND_IMAGE:$TAG-amd64" \
              "$FRONTEND_IMAGE:$TAG-arm64"
          done
