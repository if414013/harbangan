# Proxy-only Docker Compose — single backend container, no DB, no frontend.
#
# Required env vars (set in .env.proxy or pass directly):
#   PROXY_API_KEY        — API key clients use to authenticate
#
# Optional (Kiro):
#   KIRO_ENABLED         — Set to "false" to skip Kiro auth entirely (default: true)
#   KIRO_REGION          — Kiro API region (default: us-east-1)
#   KIRO_SSO_REGION      — SSO OIDC region (default: same as KIRO_REGION)
#   KIRO_SSO_URL         — SSO issuer URL (auto-derived if omitted)
#
# Optional (Copilot):
#   COPILOT_ENABLED      — Set to "true" to enable Copilot device flow (default: false)
#   COPILOT_TOKEN        — GitHub Copilot token (or obtained via device flow)
#   COPILOT_BASE_URL     — Copilot API base URL
#
# Optional (Anthropic — OAuth relay, connect after startup):
#   ANTHROPIC_ENABLED    — Set to "true" to enable Anthropic OAuth relay (default: false)
#   ANTHROPIC_OAUTH_CLIENT_ID — OAuth client ID for Anthropic PKCE flow
#
# Optional (OpenAI — OAuth relay, connect after startup):
#   OPENAI_ENABLED       — Set to "true" to enable OpenAI OAuth relay (default: false)
#   OPENAI_OAUTH_CLIENT_ID — OAuth client ID for OpenAI PKCE flow
#
# Optional (general):
#   SERVER_PORT          — Listen port (default: 8000)
#   LOG_LEVEL            — info, debug, warn, error (default: info)
#   DEBUG_MODE           — off, errors, all (default: off)
#
# Usage:
#   docker compose -f docker-compose.gateway.yml --env-file .env.proxy up -d

services:
  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ghcr.io/if414013/harbangan-backend:${IMAGE_TAG:-latest}
    restart: on-failure:5
    entrypoint: ["/app/entrypoint.sh"]
    ports:
      # Localhost only by default. Set BIND_ADDRESS=0.0.0.0 to allow Docker container access.
      - "${BIND_ADDRESS:-127.0.0.1}:${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    environment:
      # Core
      GATEWAY_MODE: "proxy"
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "${SERVER_PORT:-8000}"
      PROXY_API_KEY: "${PROXY_API_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      DEBUG_MODE: "${DEBUG_MODE:-off}"
      # Kiro (Optional)
      KIRO_ENABLED: "${KIRO_ENABLED:-true}"
      KIRO_REGION: "${KIRO_REGION:-us-east-1}"
      KIRO_SSO_REGION: "${KIRO_SSO_REGION:-}"
      KIRO_SSO_URL: "${KIRO_SSO_URL:-}"
      # Copilot (Optional)
      COPILOT_ENABLED: "${COPILOT_ENABLED:-false}"
      COPILOT_TOKEN: "${COPILOT_TOKEN:-}"
      COPILOT_BASE_URL: "${COPILOT_BASE_URL:-}"
      COPILOT_PERSIST_GITHUB_TOKEN: "${COPILOT_PERSIST_GITHUB_TOKEN:-false}"
      # Anthropic (Optional — OAuth relay, connect after startup)
      ANTHROPIC_ENABLED: "${ANTHROPIC_ENABLED:-false}"
      ANTHROPIC_OAUTH_CLIENT_ID: "${ANTHROPIC_OAUTH_CLIENT_ID:-}"
      # OpenAI (Optional — OAuth relay, connect after startup)
      OPENAI_ENABLED: "${OPENAI_ENABLED:-false}"
      OPENAI_OAUTH_CLIENT_ID: "${OPENAI_OAUTH_CLIENT_ID:-}"
    volumes:
      - gateway-data:/data
      - ./backend/entrypoint.sh:/app/entrypoint.sh:ro
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test:
        ["CMD", "curl", "-fs", "http://localhost:${SERVER_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  gateway-data:
